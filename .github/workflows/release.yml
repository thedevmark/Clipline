name: Build & Release EXE

# Tag-driven release: pushing a tag like `v0.1.1` builds the desktop EXE
# on Windows and uploads it to the GitHub release for that tag. If the
# release doesn't exist yet, the job creates it with auto-generated
# notes from the git log.
#
# `workflow_dispatch` lets you re-run the build for any existing tag
# (e.g. to (re)attach an EXE to a release that was published as
# source-only).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build for (must already exist as a release, e.g. v0.1.0)'
        required: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.value }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: python -m PyInstaller --clean --noconfirm Clipline.spec

      - name: Verify build artifact
        shell: bash
        run: |
          set -euo pipefail
          EXE=dist/clipline.exe
          if [ ! -f "$EXE" ]; then
            echo "::error::Expected $EXE was not produced." >&2
            ls -la dist/ || true
            exit 1
          fi
          # Must be a real PE executable (MZ magic), not a stub or error page.
          if [ "$(head -c 2 "$EXE")" != "MZ" ]; then
            echo "::error::$EXE is not a PE executable (bad magic) — build is broken." >&2
            exit 1
          fi
          # Size sanity. Band is intentionally wide so it holds for BOTH the
          # WebEngine build (~415 MB) and a future native build (~70 MB); it only
          # flags a truncated/empty/grossly-misconfigured artifact before it ships.
          bytes=$(stat -c%s "$EXE")
          mb=$((bytes / 1048576))
          echo "Built $EXE: ${mb} MB"
          if [ "$bytes" -lt 20971520 ] || [ "$bytes" -gt 1073741824 ]; then
            echo "::error::$EXE is ${mb} MB, outside the sane 20 MB–1 GB band — build is likely broken." >&2
            exit 1
          fi

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.value }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG does not exist yet — creating with auto-generated notes."
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --generate-notes
          fi
          gh release upload "$TAG" dist/clipline.exe \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
          # NOTE: --generate-notes yields only a bare "Full Changelog" line, and
          # this step --clobbers any manually-uploaded asset. Apply real notes
          # after CI:  gh release edit "$TAG" --notes "..."  — and if you ever add
          # a second spec, confirm CI builds the intended one BEFORE tagging.
          # See native/ALERT_REBUILD_LESSONS.md §2.
